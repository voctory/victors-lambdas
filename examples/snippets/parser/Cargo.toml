[package]
name = "parser-snippet"
description = "Buildable parser snippet for Victor's Lambdas docs."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
victors-lambdas = { path = "../../../crates/victors-lambdas", features = ["parser-aws-lambda-events"] }
aws_lambda_events = { version = "1.2.0", default-features = false, features = ["sqs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lints]
workspace = true
