[package]
name = "tracer-snippet"
description = "Buildable tracer snippet for Victor's Lambdas docs."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
victors-lambdas = { path = "../../../crates/victors-lambdas", features = ["tracer-opentelemetry", "tracer-xray-daemon"] }
opentelemetry = { version = "0.32.0", default-features = false, features = ["trace"] }
opentelemetry-otlp = { version = "0.32.0", default-features = false, features = ["http-proto", "reqwest-blocking-client", "trace"] }
opentelemetry-stdout = { version = "0.32.0", default-features = false, features = ["trace"] }
opentelemetry_sdk = { version = "0.32.0", default-features = false, features = ["trace"] }

[lints]
workspace = true
