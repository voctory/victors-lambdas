[package]
name = "batch-snippet"
description = "Buildable batch snippet for Victor's Lambdas docs."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[dependencies]
victors-lambdas = { path = "../../../crates/victors-lambdas", features = ["batch-parser"] }
aws_lambda_events = { version = "1.2.0", default-features = false, features = ["dynamodb", "kafka", "kinesis", "sqs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[lints]
workspace = true
